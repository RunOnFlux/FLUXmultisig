name: Deploy to GitHub Pages

# Builds the Vite app on every push to `production` and deploys it to
# GitHub Pages directly via the Pages-from-Actions flow.
#
# Repo prerequisite: Settings -> Pages -> "Build and deployment" Source
# must be set to "GitHub Actions" (not "Deploy from a branch").

on:
  push:
    branches: [production]
  workflow_dispatch:

# Pages-from-Actions requires these scopes
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight deploy at a time; let the latest finish so we don't
# leave the site in a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
